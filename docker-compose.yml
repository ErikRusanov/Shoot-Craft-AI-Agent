# Local dev backing services. The app itself runs on the host (`make run`);
# only infrastructure lives here. Start with `make infra`, stop with
# `make infra-down`.
services:
  redis:
    image: redis:8-alpine
    # AOF on: dev state survives a container restart, same guarantee the
    # reliability tests pin (tests/test_concurrency.py).
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
