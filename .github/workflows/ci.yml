# Lint, types, tests. Redis/MinIO integration tests run via testcontainers —
# the same path as local dev — using the Docker daemon preinstalled on
# ubuntu-latest runners, so the workflow needs no service containers.
name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      # --frozen: CI must test exactly the locked resolution, never re-resolve.
      - name: Sync environment
        run: uv sync --frozen

      - name: Lint
        run: make lint

      - name: Type check
        run: make type

      - name: Tests
        run: make test
