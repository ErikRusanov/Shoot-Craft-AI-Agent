# DEMO fallback preset — MIT, ships in the public repo so the core's fallback
# convention runs out of the box. This is NOT the curated library (the moat); it
# only exercises the loader, the matcher fallback, and the free-form scene slot.
#
# Convention with the matcher: the id `default` is RESERVED. When no curated
# preset's `applies_to` covers the request, the matcher resolves to THIS preset
# instead of failing. The use_case token `default` is reserved too — never
# keyword-matched, never used by another preset.
#
# Framing: this is a photo EDIT of a real reference, not "a portrait in their
# likeness". The frozen blocks below tell the model to reproduce the exact person
# and apply ONLY the user's requested change ({scene}); everything else stays as
# in the reference. That keeps "do not change the photo, make the background blue"
# an edit, not a fresh generation that drifts the face.
id: default
version: 1.1.0

applies_to:
  # The reserved fallback token — see the header.
  use_case: [default]

# Delta-driven: start from the user's photo and apply only the named changes.
# This is the base edit-mode preset the brief parser falls through to.
mode: edit

style_notes: >-
  A faithful edit — describe only the delta and its integration into the photo
  (light direction, shadows, grain); never re-describe the person.

# The pixel-for-pixel lock wording deliberately repeats the core's edit-mode
# lock block: repetition of the lock rhetoric is what holds the face through a
# chained edit.
identity_instruction: >-
  Reproduce the exact person from the reference photo. The person is LOCKED and
  must be copied pixel-for-pixel from the original: the entire face, every facial
  feature, expression, eyes, nose, mouth, jaw, beard or stubble, hair, skin
  texture and skin tone, the body, the pose and the hands. Do NOT regenerate,
  repaint, smooth, retouch, denoise or beautify any part of the person. Keep the
  face at the exact original sharpness, grain and raw skin texture. This is a
  photo edit of a real person — never a new portrait merely resembling them.

# {scene} carries the user's own change request, verbatim. The framing is an
# edit: apply only that change, keep everything else as the reference shows it.
prompt_structure: >-
  Edit the reference photo of the person. Apply only the following change:
  {scene}. Everything not named in that change must remain exactly as in the
  reference photo — the same face, the same person, the same framing and setting
  unless the change says otherwise. Keep it photorealistic with natural skin
  texture and true-to-life colors; add no stylization beyond the requested change.

negative_prompt: >-
  cartoon, illustration, 3d render, plastic or waxy skin, over-smoothed skin,
  beauty filter, beauty retouching, distorted face, changed facial expression,
  changed pose, repositioned or redrawn hands, shifted framing or crop, extra
  fingers, duplicated person, watermark, text, logo, low resolution, blurry,
  different person.

slots:
  # The single clarifying question — FREE-FORM (no enum): the user describes the
  # change in their own words. NO default on purpose: a missing description must
  # trigger a question (or be fed from the start brief), never a silent generic
  # phrase that overrides what the user actually asked for. The prompt builder
  # sanitizes the text (scene-only; face/identity edits are rejected).
  scene:
    required: true
    ask: true

generation:
  # Low temperature: a faithful edit, not a creative reinterpretation.
  temperature: 0.20
  aspect_ratio: "3:4"
  face_media_resolution: high

thresholds:
  # TODO(calibrate): placeholders. Re-run the sandbox after the edit-framing
  # change and tune against this pipeline's real-vs-AI similarity distribution.
  similarity_threshold: 0.60  # placeholder
  identity_floor: 0.50  # placeholder
  K_max_retries: 3

compositions:
  - id: studio_neutral
    label: "Studio — clean neutral backdrop"
    slot_overrides:
      scene: "place the person against a clean, minimal neutral studio backdrop"

anchor_examples: []
